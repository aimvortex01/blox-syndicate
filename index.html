<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLOX SYNDICATE | CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --accent: #ff0055; --bg: #000000; }
        body { 
            background-color: var(--bg); 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
            text-transform: uppercase;
        }
        .font-sync { font-family: 'Syncopate', sans-serif; }

        /* Animated Background Mesh */
        .bg-mesh {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.03) 0%, transparent 70%);
            z-index: -1; pointer-events: none;
        }

        /* WIDE DOSSIER SPLASH BOX */
        #splash {
            position: fixed; inset: 0; z-index: 1000; background: #000;
            display: flex; align-items: center; justify-content: center;
        }
        .premium-box {
            background: rgba(10, 10, 10, 0.8);
            border-top: 1px solid rgba(0, 242, 255, 0.3);
            border-bottom: 1px solid rgba(0, 242, 255, 0.3);
            padding: 60px 20px;
            text-align: center;
            width: 100%;
            backdrop-filter: blur(10px);
        }

        /* Noticeable Typography */
        .noticeable-title {
            font-size: 1.4rem; font-weight: 900; letter-spacing: 4px; line-height: 1.3; margin-bottom: 30px;
        }

        /* ROUNDED CONTINUE BUTTON WITH ARROW */
        .btn-continue {
            background: #ffffff;
            color: #000000;
            padding: 14px 40px;
            font-weight: 900;
            font-size: 0.75rem;
            letter-spacing: 2px;
            border-radius: 9999px; /* Fully Rounded */
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }
        .btn-continue:active { transform: scale(0.95); background: var(--cyan); }

        /* Dashboard Styles */
        .glass-nav {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
        }

        /* Stat Rings */
        .ring-svg { transform: rotate(-90deg); }
        .ring-bg { stroke: rgba(255,255,255,0.05); }
        .ring-fill { stroke-dasharray: 226; stroke-dashoffset: 226; transition: stroke-dashoffset 1.5s ease-out; }

        /* Dossier Card */
        .dossier-card {
            background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px; overflow: hidden;
            transition: transform 0.3s ease;
        }
        
        .hidden-ui { display: none; opacity: 0; }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>

    <!-- Splash Screen -->
    <section id="splash">
        <div class="premium-box">
            <p class="text-[9px] text-cyan-500 mb-4 tracking-[6px] font-bold">SYSTEM ACCESS GRANTED</p>
            <h1 class="noticeable-title font-sync">
                YOU ARE ONE OF OUR TAP COUNTINUE <br>
                <span class="text-cyan-400">FOOLISH VICTIMS</span>
            </h1>
            <button onclick="unlock()" class="btn-continue font-sync">
                CONTINUE 
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </div>
    </section>

    <!-- Dashboard -->
    <div id="main-content" class="hidden-ui max-w-2xl mx-auto px-6 py-12">
        <header class="flex justify-between items-center mb-16">
            <div>
                <h1 class="font-sync text-xl font-black tracking-tighter">BLOX SYNDICATE</h1>
                <div class="flex items-center gap-2 mt-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-cyan-500 animate-pulse"></span>
                    <p id="status" class="text-[9px] font-bold text-gray-500 tracking-[2px]">SCANNING...</p>
                </div>
            </div>
            <div class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center">
                <div class="w-2 h-2 bg-white rounded-full"></div>
            </div>
        </header>

        <!-- Stats Section -->
        <div class="grid grid-cols-3 gap-4 mb-16">
            <div class="flex flex-col items-center">
                <svg width="70" height="70" class="ring-svg">
                    <circle class="ring-bg" cx="35" cy="35" r="32" fill="none" stroke-width="3"/>
                    <circle id="ring-t" class="ring-fill" cx="35" cy="35" r="32" fill="none" stroke-width="3" stroke="var(--cyan)" stroke-linecap="round"/>
                </svg>
                <span id="stat-t" class="mt-[-46px] font-bold text-lg">0</span>
                <span class="mt-8 text-[8px] text-gray-500 font-bold tracking-widest">TARGETS</span>
            </div>
            <div class="flex flex-col items-center">
                <svg width="70" height="70" class="ring-svg">
                    <circle class="ring-bg" cx="35" cy="35" r="32" fill="none" stroke-width="3"/>
                    <circle id="ring-p" class="ring-fill" cx="35" cy="35" r="32" fill="none" stroke-width="3" stroke="#a855f7" stroke-linecap="round"/>
                </svg>
                <span id="stat-p" class="mt-[-46px] font-bold text-lg">0</span>
                <span class="mt-8 text-[8px] text-gray-500 font-bold tracking-widest">PHOTOS</span>
            </div>
            <div class="flex flex-col items-center">
                <svg width="70" height="70" class="ring-svg">
                    <circle class="ring-bg" cx="35" cy="35" r="32" fill="none" stroke-width="3"/>
                    <circle id="ring-v" class="ring-fill" cx="35" cy="35" r="32" fill="none" stroke-width="3" stroke="var(--accent)" stroke-linecap="round"/>
                </svg>
                <span id="stat-v" class="mt-[-46px] font-bold text-lg">0</span>
                <span class="mt-8 text-[8px] text-gray-500 font-bold tracking-widest">VIDEOS</span>
            </div>
        </div>

        <div class="flex items-center gap-4 mb-10">
            <h3 class="font-sync text-[9px] font-bold text-gray-500 tracking-[3px]">COLLECTED_INTEL</h3>
            <div class="h-[1px] flex-1 bg-white/5"></div>
        </div>

        <div id="target-feed" class="space-y-12">
            <!-- Skeleton Card -->
            <div class="h-64 bg-white/5 animate-pulse rounded-xl"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBB7SiRkDHl-3X6N6OxmgFNt8YV61BCFsQ",
            authDomain: "blox-syndicate.firebaseapp.com",
            projectId: "blox-syndicate",
            storageBucket: "blox-syndicate.firebasestorage.app",
            messagingSenderId: "82487008727",
            appId: "1:82487008727:web:931e81dd2de9ba1f8eff92"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.unlock = () => {
            gsap.to("#splash", { opacity: 0, duration: 0.6, ease: "power2.inOut", onComplete: () => {
                document.getElementById('splash').style.display = 'none';
                const main = document.getElementById('main-content');
                main.classList.remove('hidden-ui');
                gsap.to(main, { opacity: 1, duration: 0.8 });
                
                setTimeout(() => {
                    const status = document.getElementById('status');
                    status.innerText = "SYSTEM_SCANNED";
                    status.style.color = "#00f2ff";
                }, 1000);

                logVisit();
                renderData();
            }});
        }

        async function logVisit() {
            try { await addDoc(collection(db, "visits"), { time: serverTimestamp() }); } catch(e){}
        }

        function renderData() {
            const q = query(collection(db, "targets"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById('target-feed');
                feed.innerHTML = '';
                let t=0, p=0, v=0;

                snapshot.forEach(doc => {
                    const data = doc.data();
                    t++; data.mediaType === 'video' ? v++ : p++;
                    
                    feed.innerHTML += `
                        <div class="dossier-card shadow-2xl">
                            <div class="relative h-80 sm:h-[450px]">
                                ${data.mediaType === 'video' 
                                    // Yahan autoplay hataya hai aur controls add kiye hain
                                    ? `<video src="${data.mediaUrl}" controls playsinline class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700"></video>`
                                    : `<img src="${data.mediaUrl}" class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700">`
                                }
                                <!-- pointer-events-none add kiya hai taaki video controls click ho sakein -->
                                <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent pointer-events-none"></div>
                                <div class="absolute bottom-6 left-6 pointer-events-none">
                                    <p class="text-[9px] font-bold text-cyan-400 tracking-[3px] mb-2 uppercase">ROBLOX ID: ${data.robloxID}</p>
                                    <h4 class="font-sync text-sm sm:text-base font-bold tracking-widest uppercase">ROBLOX ID NAME :- ${data.name}</h4>
                                </div>
                            </div>
                            <div class="p-8">
                                <div class="flex items-center gap-3 mb-6">
                                    <span class="text-[9px] font-black text-white bg-white/10 px-3 py-2 rounded uppercase tracking-widest">ROBLOX NAME : ${data.gameName}</span>
                                </div>
                                <div class="text-gray-400 text-sm font-medium leading-relaxed lowercase tracking-wide first-letter:uppercase">
                                    <span class="text-white font-bold uppercase text-[10px] tracking-widest block mb-2">DESCRIPTION :-</span>
                                    ${data.description}
                                </div>
                            </div>
                        </div>
                    `;
                });

                document.getElementById('stat-t').innerText = t;
                document.getElementById('stat-p').innerText = p;
                document.getElementById('stat-v').innerText = v;
                
                // Animate Rings
                document.getElementById('ring-t').style.strokeDashoffset = 226 - (226 * (t / 50));
                document.getElementById('ring-p').style.strokeDashoffset = 226 - (226 * (p / 50));
                document.getElementById('ring-v').style.strokeDashoffset = 226 - (226 * (v / 50));
            });
        }
    </script>
</body>
</html>
